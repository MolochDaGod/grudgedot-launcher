<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <!-- Black shadow/outline layer -->
  <text x="200" y="78" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-weight="900" font-size="82" letter-spacing="4" fill="#000000" stroke="#000000" stroke-width="8" stroke-linejoin="bevel" paint-order="stroke">GRUDGE</text>
  <!-- Orange fill layer -->
  <text x="198" y="76" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-weight="900" font-size="82" letter-spacing="4" fill="#FF6600" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="bevel" paint-order="stroke">GRUDGE</text>
  <!-- Highlight edge -->
  <text x="198" y="76" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-weight="900" font-size="82" letter-spacing="4" fill="none" stroke="#FF8833" stroke-width="0.5" stroke-linejoin="bevel" opacity="0.6">GRUDGE</text>
</svg>
